name: mi_lista_plus
description: App Flutter online-first para consultar precios, puntos y generar simulaciones de Mi Lista +.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.0
  connectivity_plus: ^6.1.0
  firebase_core: ^3.10.0
  flutter_cache_manager: ^3.4.1
  google_mobile_ads: ^5.3.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  intl: ^0.20.1
  shared_preferences: ^2.3.5
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
